id: 13, tag: 'breakthrough', title: '欧洲空调荒漠：美的如何撕开200亿缺口', isNew: true,
    summary: '欧洲家庭空调普及率不足5%，百年建筑不让打孔、环保法规卡死制冷剂、人工比机器贵——所有人都说欧洲做不了空调。美的靠便携式+环保制冷剂撕开的口子正在变成洪流。',
    date: '2026-06-29',
    source: '综合整理自Bloomberg、Reuters、36氪等',
    detail: `<h3>困境：欧洲为什么是"空调荒漠"</h3>
<table><thead><tr><th>限制因素</th><th>具体内容</th></tr></thead><tbody>
<tr><td>建筑法规</td><td>大量百年老建筑受文物保护法保护，外墙禁止打孔安装外机；石质墙体钻孔难度极大</td></tr>
<tr><td>环保限制</td><td>欧盟F-Gas法规对制冷剂温室效应值(GWP)限值极严，传统R410a制冷剂GWP高达2088，直接被禁</td></tr>
<tr><td>安装成本</td><td>欧洲人工费极高，安装一台分体空调的人工费（€1500-3000）经常超过机器本身价格</td></tr>
<tr><td>文化认知</td><td>长期认为"吹空调致病"，习惯自然通风；北欧国家甚至认为夏天不需要制冷</td></tr>
<tr><td>渠道壁垒</td><td>家电销售渠道以建材市场为主，普通消费者购买和安装极度不便</td></tr>
</tbody></table>

<h3>美的的破局路径</h3>
<ol>
<li><strong>产品形态创新——绕开建筑限制</strong>：主推便携式移动空调（Portable AC）和窗式机，无需外墙打孔、无需专业安装，插电即用。针对老建筑开发简易安装套件，减少铜管连接复杂度。</li>
<li><strong>环保合规先行——攻克技术门槛</strong>：率先采用R290（丙烷）等自然制冷剂，GWP仅3，完全符合欧盟F-Gas法规。其他品牌还在观望时，美的已拿到全系列环保认证。</li>
<li><strong>渠道降维打击——电商直触消费者</strong>：绕过传统建材批发渠道，通过Amazon、本地电商平台直接面向C端销售，解决"买不到"和"安装难"两大痛点。</li>
<li><strong>借势气候变暖——改变消费认知</strong>：欧洲极端高温（45°C+）频发，空调从"奢侈品"变成"生存必需品"，消费者主动抛弃了环保顾虑。</li>
</ol>

<h3>当前市场状态</h3>
<ul>
<li>2022-2023年夏季，美的便携空调在欧洲多次售罄，补货周期长达数月</li>
<li>热门型号价格较淡季上涨3-10倍，二手市场加价转卖</li>
<li>美的（含旗下品牌）已成为欧洲便携空调市场绝对龙头</li>
<li>欧洲空调市场规模预计2030年超过200亿欧元，中国品牌占据先发优势</li>
</ul>

<div class="highlight-box"><strong>关键信息差</strong>：欧洲不是"不需要空调"，而是"没有被提供合适的空调产品"。所有本地企业和国际巨头都认为欧洲空调市场做不了，美的用"便携+环保+电商"三招证明他们都错了。等传统品牌反应过来，渠道和消费者心智已经被占满。</div>`

    detail: `<h3>启示</h3><ul><li>先在小市场建立能力（东南亚）→再进入大市场（中国）</li><li>区域网络效应（东南亚多国联动物流）</li><li>与电商平台深度绑定（Shopee/Lazada/TikTok Shop）</li></ul>`,
    source: '综合整理自公开信息'
  },
  {
    id: 300, tag: 'breakthrough', date: '2026-06-29', isNew: true,
    title: '创业黑马：独立开发者打造月入$10万的SaaS',
    summary: '解析多个独立开发者(Indie Hacker)如何靠一个人（或极小团队）打造月入$1万-10万的SaaS产品。',
    detail: `<h3>共性</h3><ul><li>解决一个极具体的痛点（niche down到极致）</li><li>SEO是主要增长引擎（写大量长尾内容）</li><li>产品内建付费墙和免费层设计精妙</li><li>客户支持=产品反馈（亲自回复每一封邮件）</li></ul>`,
    source: '综合整理自公开信息'
  }
];

function renderCards() {
  const grid = document.getElementById('feedGrid');
  let filtered = DATA;
  if (activeCat !== 'all') filtered = filtered.filter(d => d.tag === activeCat);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(d => d.title.toLowerCase().includes(s) || d.summary.toLowerCase().includes(s) || d.tag.toLowerCase().includes(s));
  }
  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('todayCount').textContent = DATA.filter(d => d.isNew).length;
  document.getElementById('resultHint').textContent = filtered.length ? `共 ${filtered.length} 条深度信息` : '';
  if (!filtered.length) { grid.innerHTML = '<div class="no-result">没有找到匹配的信息差条目，试试换个关键词</div>'; return; }
  grid.innerHTML = filtered.map(d => {
    const cls = {money:'tag-money',immigration:'tag-immigration',tech:'tag-tech',arbitrage:'tag-arbitrage',life:'tag-life',breakthrough:'tag-breakthrough'}[d.tag];
    const lbl = {money:'赚钱机会',immigration:'移民政策',tech:'科技前沿',arbitrage:'信息套利',life:'海外生活',breakthrough:'市场破局'}[d.tag];
    const nb = d.isNew ? '<span style="background:#ff6b6b;color:#fff;font-size:10px;padding:2px 6px;border-radius:8px;margin-left:6px;">NEW</span>' : '';
    return `<div class="card" data-id="${d.id}" onclick="openDetail(${d.id})"><span class="card-tag ${cls}">${lbl}${nb}</span><h3>${d.title}</h3><p>${d.summary}</p><div class="meta"><span>${d.date}</span></div><div class="cta-hint">点击查看完整信息 →</div></div>`;
  }).join('');
}

function openDetail(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const cls = {money:'tag-money',immigration:'tag-immigration',tech:'tag-tech',arbitrage:'tag-arbitrage',life:'tag-life',breakthrough:'tag-breakthrough'}[d.tag];
  const lbl = {money:'赚钱机会',immigration:'移民政策',tech:'科技前沿',arbitrage:'信息套利',life:'海外生活',breakthrough:'市场破局'}[d.tag];
  document.getElementById('detailPanel').innerHTML = `
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <span class="card-tag ${cls}" style="margin-bottom:12px;">${lbl}</span>
    <h2>${d.title}</h2>
    <div class="detail-meta">发布日期：${d.date} · ${d.source}</div>
    <div class="detail-content">${d.detail}</div>
    <div class="detail-source">信息来源：${d.source}</div>
  `;
  document.getElementById('detailOverlay').classList.add('active');
  document.getElementById('detailPanel').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('detailOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

document.getElementById('categoryFilters').addEventListener('click', e => {
  if (!e.target.classList.contains('cat-btn')) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeCat = e.target.dataset.cat;
  renderCards();
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderCards();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

renderCards();
</script>
</body>
</html>
